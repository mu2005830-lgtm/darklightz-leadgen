name: Build & Release — Windows

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Runs when you push a tag like  v2.0.0  or  v2.1.0-beta
# How to create a release:
#   git tag v2.0.0
#   git push origin v2.0.0
# ---------------------------------------------------------------------------
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows EXE and publish Release
    runs-on: windows-latest

    defaults:
      run:
        working-directory: darklightz-leadgen

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Check out source
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python 3.11
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 3. Install Python dependencies + PyInstaller
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt
          pip install pyinstaller

      # -----------------------------------------------------------------------
      # 4. Install Playwright Chromium browser
      # -----------------------------------------------------------------------
      - name: Install Playwright Chromium
        run: playwright install chromium

      # -----------------------------------------------------------------------
      # 5. Ensure assets folder exists (icon.ico is optional — build continues
      #    without it; PyInstaller will use a default icon)
      # -----------------------------------------------------------------------
      - name: Prepare assets folder
        shell: cmd
        run: |
          if not exist "assets" mkdir assets

      # -----------------------------------------------------------------------
      # 6. Resolve Playwright driver path and build with PyInstaller
      #    (mirrors build.bat step 6 exactly)
      # -----------------------------------------------------------------------
      - name: Build Windows executable (PyInstaller)
        shell: cmd
        run: |
          for /f "delims=" %%d in ('python -c "import playwright, os; print(os.path.join(os.path.dirname(playwright.__file__), 'driver'))"') do (
            set PLAYWRIGHT_DRIVER=%%d
          )
          echo Playwright driver: %PLAYWRIGHT_DRIVER%

          pyinstaller ^
            --noconfirm ^
            --clean ^
            --onedir ^
            --windowed ^
            --name "DarklightzLeadGenerator" ^
            --add-data "assets;assets" ^
            --add-data "database;database" ^
            --add-data "backend;backend" ^
            --add-data "frontend;frontend" ^
            --add-data "exports;exports" ^
            --add-data "utilities;utilities" ^
            --add-data "%PLAYWRIGHT_DRIVER%;playwright/driver" ^
            --collect-all playwright ^
            --collect-all PyQt6 ^
            --hidden-import "PyQt6" ^
            --hidden-import "PyQt6.QtWidgets" ^
            --hidden-import "PyQt6.QtCore" ^
            --hidden-import "PyQt6.QtGui" ^
            --hidden-import "PyQt6.sip" ^
            --hidden-import "PyQt6.QtNetwork" ^
            --hidden-import "playwright" ^
            --hidden-import "playwright.sync_api" ^
            --hidden-import "playwright._impl._driver" ^
            --hidden-import "openpyxl" ^
            --hidden-import "openpyxl.styles" ^
            --hidden-import "reportlab" ^
            --hidden-import "reportlab.platypus" ^
            --hidden-import "reportlab.lib.styles" ^
            --hidden-import "lxml" ^
            --hidden-import "lxml.etree" ^
            --hidden-import "bs4" ^
            --hidden-import "sqlite3" ^
            --hidden-import "logging.handlers" ^
            main.py

      # -----------------------------------------------------------------------
      # 7. Copy Playwright Chromium into the dist folder
      #    (so the .exe works on any PC without installing Playwright)
      # -----------------------------------------------------------------------
      - name: Bundle Playwright Chromium browser
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\ms-playwright"
          $dst = "dist\DarklightzLeadGenerator\ms-playwright"
          if (Test-Path $src) {
            Write-Host "Copying Playwright browsers from: $src"
            Copy-Item -Recurse -Force $src $dst
            Write-Host "Done. Browsers bundled."
          } else {
            Write-Host "WARNING: ms-playwright not found at $src"
            Write-Host "The .exe will launch but Chromium must be installed on the target PC."
          }

      # -----------------------------------------------------------------------
      # 8. Zip the entire dist folder
      # -----------------------------------------------------------------------
      - name: Create release archive
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $zipName = "DarklightzLeadGenerator-${tag}-Windows.zip"
          Compress-Archive -Path "dist\DarklightzLeadGenerator\*" -DestinationPath $zipName
          Write-Host "Archive created: $zipName"
          Write-Host "SIZE: $((Get-Item $zipName).Length / 1MB) MB"

      # -----------------------------------------------------------------------
      # 9. Publish GitHub Release and upload the zip
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Darklightz Lead Generator ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: darklightz-leadgen/DarklightzLeadGenerator-${{ github.ref_name }}-Windows.zip
          body: |
            ## Darklightz Lead Generator ${{ github.ref_name }}

            **Developed by Darklightz Studio** — Professional Lead Generation Suite.

            ---

            ### How to Install

            1. Download `DarklightzLeadGenerator-${{ github.ref_name }}-Windows.zip`
            2. Extract the zip to any folder on your PC
            3. Run `DarklightzLeadGenerator.exe`

            **No Python installation required** — everything is bundled (Chromium included).

            ---

            ### How to Update from a Previous Version

            1. Close the running app
            2. Download and extract this zip to any folder
            3. Run `DarklightzLeadGenerator.exe` — your existing database is untouched

            ---

            ### What's New

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/darklightz-leadgen/CHANGELOG.md) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
